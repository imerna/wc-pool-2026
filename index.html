<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC Pool 2026 — Standings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ──────────────────────────────────────────────────────────────────────────
       "KIT" THEME — brutalist streetwear scoreboard
       Concrete-paper ground, white cards with thick black outlines + hard offset
       shadows, square gold/silver/bronze medal blocks, red-orange energy bars,
       Archivo Black display + Space Grotesk body + Space Mono data.
    ────────────────────────────────────────────────────────────────────────── */
    :root {
      --bg:        #e9e5db;
      --card:      #ffffff;
      --ink:       #14110c;
      --muted:     #6f685b;
      --accent:    #ff4422;
      --live:      #0aa34a;
      --gold:      #ffcf2e;
      --silver:    #d8d8d4;
      --bronze:    #ff9a4d;
      --chip:      #f3f1ea;
      --f-display: 'Archivo Black', system-ui, sans-serif;
      --f-body:    'Space Grotesk', system-ui, sans-serif;
      --f-mono:    'Space Mono', monospace;
      --radius:    6px;
      --border-w:  2.5px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--f-body);
      min-height: 100vh;
      padding-bottom: 3.5rem;
    }

    /* ── Header ── */
    header { padding: 2.6rem 1.25rem 1.5rem; text-align: center; }

    .eyebrow {
      font-family: var(--f-display);
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    h1 {
      font-family: var(--f-display);
      font-weight: 800;
      font-size: clamp(2.7rem, 8vw, 4.2rem);
      letter-spacing: 0.015em;
      line-height: 0.9;
      text-transform: uppercase;
      color: var(--ink);
    }

    #status-bar {
      margin-top: 0.7rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.6rem;
      min-height: 1.1rem;
      font-family: var(--f-mono);
      font-size: 0.7rem;
      letter-spacing: 0.02em;
      color: var(--muted);
    }
    .spinner { display: inline-block; font-size: 0.8rem; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .controls { margin-top: 1.15rem; display: flex; justify-content: center; gap: 0.45rem; flex-wrap: wrap; }
    .pill {
      font-family: var(--f-display);
      font-weight: 700;
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.42rem 0.92rem;
      border-radius: 999px;
      line-height: 1;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--ink);
      transition: all 0.15s ease;
    }
    .pill.active.live  { background: rgba(10,163,74,0.16);  color: var(--live);   border-color: var(--live); }
    .pill.active.error { background: rgba(255,68,34,0.16);  color: var(--accent); border-color: var(--accent); }

    /* Dev pills hidden until Shift+D */
    #mode-btn, #error-btn { display: none; }
    .dev-mode #mode-btn, .dev-mode #error-btn { display: inline-block; }
    #fetched-at { display: none; font-family: var(--f-mono); font-size: 0.65rem; color: var(--muted); opacity: 0.7; }
    .dev-mode #fetched-at { display: inline; }
    #fetched-toast {
      display: none;
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: #14110c; color: #e9e5db;
      font-family: var(--f-mono); font-size: 0.75rem;
      padding: 0.4rem 0.9rem; border-radius: 999px;
      pointer-events: none; z-index: 9999;
      white-space: nowrap;
    }
    #fetched-toast.visible { display: block; }
    #status-bar { user-select: none; -webkit-user-select: none; }

    /* Status bar color matches active mode */
    #last-updated { transition: color 0.3s ease; }
    #last-updated.state-live  { color: var(--live); }
    #last-updated.state-demo  { color: var(--gold); }
    #last-updated.state-error { color: var(--accent); }

    /* ── Layout ── */
    main { max-width: 760px; margin: 0 auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 0.95rem; }

    /* ── Participant cards ── */
    .card {
      background: var(--card);
      border: var(--border-w) solid var(--ink);
      border-radius: var(--radius);
      box-shadow: 5px 5px 0 var(--ink);
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    @media (hover: hover) { .card:hover { transform: translateY(-2px); box-shadow: 9px 9px 0 var(--ink); } }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.95rem;
      padding: 1rem 1.15rem;
      cursor: pointer;
      user-select: none;
    }

    .medal {
      width: 2.7rem; height: 2.7rem;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--f-display); font-weight: 800; font-size: 1.1rem;
      border: var(--border-w) solid var(--ink);
      border-radius: 5px;
      background: #fff; color: var(--ink);
    }
    .card.rank-1 .medal { background: var(--gold); }
    .card.rank-2 .medal { background: var(--silver); }
    .card.rank-3 .medal { background: var(--bronze); }

    .mid { flex: 1; min-width: 0; }
    .name { font-family: var(--f-body); font-weight: 700; font-size: 1.38rem; line-height: 1.05; letter-spacing: -0.01em; }
    .flag-kit { display: flex; gap: 0.18rem; margin-top: 0.38rem; flex-wrap: wrap; line-height: 1; }
    .flag-kit .flag { font-size: 0.92rem; transition: opacity 0.2s ease, filter 0.2s ease; }
    .flag-kit .flag.elim { opacity: 0.3; filter: grayscale(1); }
    .flag-kit .flag.live { filter: drop-shadow(0 0 4px var(--live)); }

    .right { display: flex; align-items: center; gap: 0.7rem; flex-shrink: 0; }
    .score { font-family: var(--f-display); font-weight: 800; font-size: 2.2rem; line-height: 0.82; letter-spacing: 0.01em; text-align: right; }
    .pts   { font-family: var(--f-mono); font-size: 0.56rem; font-weight: 600; letter-spacing: 0.22em; color: var(--muted); margin-top: 0.2rem; text-align: right; }
    .chev  { font-size: 1.5rem; line-height: 1; color: var(--muted); transition: transform 0.25s ease; }
    .card.expanded .chev { transform: rotate(90deg); }

    /* ── Energy bar ── */
    .bar { height: 7px; background: var(--ink); }
    .bar > i { display: block; height: 100%; background: var(--accent); border-radius: 0 3px 3px 0; transition: width 0.7s cubic-bezier(0.16,1,0.3,1); }
    .card.rank-1 .bar > i { background: var(--gold); }
    .card.rank-2 .bar > i { background: var(--silver); }
    .card.rank-3 .bar > i { background: var(--bronze); }

    /* ── Breakdown (expand/collapse) ── */
    .breakdown { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.35s ease, opacity 0.3s ease; }
    .card.expanded .breakdown { max-height: 900px; opacity: 1; }
    .breakdown-inner { padding: 0.35rem 0.9rem 1rem; user-select: none; -webkit-user-select: none; }

    .team-row {
      display: grid;
      grid-template-columns: 1.7rem 1fr auto;
      gap: 0.6rem;
      align-items: center;
      padding: 0.55rem 0.35rem;
      border-bottom: 1px solid var(--ink);
    }
    .team-row:last-child { border-bottom: none; }
    .team-row.elim { opacity: 0.5; }

    .t-flag  { font-size: 1.15rem; line-height: 1; text-align: center; user-select: none; -webkit-user-select: none; }
    .t-name  { font-family: var(--f-body); font-weight: 600; font-size: 1rem; min-width: 0; display: flex; align-items: center; gap: 0.1rem; }
    .t-mult  { font-family: var(--f-mono); font-size: 0.75rem; color: var(--muted); opacity: 0.7; }
    .t-score { font-family: var(--f-display); font-weight: 700; font-size: 1.25rem; line-height: 1; text-align: right; letter-spacing: 0.01em; }
    .t-detail {
      grid-column: 1 / -1;
      font-family: var(--f-mono); font-size: 0.7rem; color: var(--muted);
      display: flex; gap: 0.35rem; flex-wrap: wrap; align-items: center;
      padding: 0.1rem 0 0 1.6rem; line-height: 1.5;
    }

    .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--live); margin-left: 0.4rem; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.82); } }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center;
      font-family: var(--f-mono); font-size: 0.58rem; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
      padding: 0.12rem 0.36rem; border-radius: 5px; white-space: nowrap;
      background: var(--chip); color: var(--muted); border: 1px solid var(--ink);
    }
    .badge.r32      { background: rgba(139,92,246,0.16); color: #8b5cf6; border-color: rgba(139,92,246,0.34); }
    .badge.qf       { background: rgba(56,128,255,0.16); color: #4f8cff; border-color: rgba(56,128,255,0.34); }
    .badge.sf       { background: rgba(34,197,94,0.16);  color: #22c55e; border-color: rgba(34,197,94,0.34); }
    .badge.final    { background: rgba(234,179,8,0.18);  color: #ca9a04; border-color: rgba(234,179,8,0.42); }
    .badge.champion { background: rgba(255,68,34,0.18);  color: var(--accent); border-color: rgba(255,68,34,0.5); }

    /* ── Error state ── */
    .error-state { text-align: center; padding: 3.5rem 1.25rem 3rem; max-width: 520px; margin: 0 auto; }
    .error-icon { font-size: 4.6rem; display: inline-block; margin-bottom: 1.1rem; transform-origin: center bottom; animation: tilt 2.2s ease-in-out infinite; }
    @keyframes tilt { 0%, 100% { transform: rotate(-9deg); } 50% { transform: rotate(9deg); } }
    .error-title { font-family: var(--f-display); font-weight: 800; font-size: 1.9rem; text-transform: uppercase; letter-spacing: 0.01em; margin-bottom: 0.5rem; }
    .error-sub   { font-family: var(--f-mono); font-size: 0.8rem; line-height: 1.8; color: var(--muted); }

    .hidden { display: none !important; }

    /* ── View nav ── */
    .view-nav { margin: 0.5rem 0 0.6rem; display: flex; justify-content: center; gap: 0.6rem; }
    .view-nav .pill { font-size: 0.92rem; padding: 0.55rem 1.5rem; border-width: 2px; }
    .view-nav .pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    /* ── Match filters ── */
    .match-filters { max-width: 760px; margin: 0 auto 1rem; padding: 0 1rem; display: flex; gap: 0.45rem; flex-wrap: wrap; }
    .match-filters .pill.active { background: rgba(20,17,12,0.12); color: var(--ink); }

    /* ── Date group header ── */
    .date-header { max-width: 760px; margin: 0 auto 0.5rem; padding: 0 1rem;
      font-family: var(--f-display); font-size: 0.78rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--muted); }
    .date-header + .date-header, .match-card + .date-header { margin-top: 1.4rem; }

    /* ── Match card ── */
    .match-card { background: var(--card); border: var(--border-w) solid var(--ink);
      border-radius: var(--radius); box-shadow: 4px 4px 0 var(--ink);
      max-width: 760px; margin: 0 auto 0.6rem; padding: 0.75rem 1rem; }

    .match-meta { display: flex; justify-content: space-between; align-items: center;
      font-family: var(--f-mono); font-size: 0.65rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.6rem; }
    .match-status-live { color: var(--live); display: flex; align-items: center; gap: 0.3rem; }

    .match-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 0.5rem; }
    .match-home { display: flex; align-items: center; gap: 0.45rem; }
    .match-away { display: flex; align-items: center; gap: 0.45rem; justify-content: flex-end; }
    .match-team-name { font-family: var(--f-body); font-weight: 600; font-size: 1rem; }
    .match-team-flag { font-size: 1.3rem; line-height: 1; flex-shrink: 0; }
    .match-score { font-family: var(--f-display); font-size: 1.6rem; line-height: 1;
      text-align: center; letter-spacing: 0.04em; white-space: nowrap; padding: 0 0.25rem; }
    .match-score-vs { font-family: var(--f-mono); font-size: 0.8rem; color: var(--muted); text-align: center; }
    .match-home.lost, .match-away.lost { opacity: 0.38; }

    /* ── Match empty state ── */
    .match-empty { text-align: center; padding: 3rem 1rem;
      font-family: var(--f-mono); font-size: 0.8rem; color: var(--muted); line-height: 1.8; }

    /* ── Score breakdown modal ── */
    .score-modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .score-modal.hidden { display: none !important; }
    .score-modal-backdrop { position: absolute; inset: 0; background: rgba(20,17,12,0.55); }
    .score-modal-card {
      position: relative; z-index: 1;
      background: var(--card); border: var(--border-w) solid var(--ink);
      border-radius: var(--radius); box-shadow: 7px 7px 0 var(--ink);
      width: min(92vw, 380px); padding: 1.25rem 1.25rem 1rem;
    }
    .score-modal-header {
      display: flex; align-items: center; gap: 0.55rem; margin-bottom: 1rem;
    }
    .score-modal-flag { font-size: 1.6rem; line-height: 1; flex-shrink: 0; }
    .score-modal-name { font-family: var(--f-body); font-weight: 700; font-size: 1.05rem; flex: 1; min-width: 0; }
    .score-modal-close {
      background: none; border: var(--border-w) solid var(--ink); border-radius: 4px;
      font-size: 0.85rem; line-height: 1; padding: 0.25rem 0.45rem; cursor: pointer;
      color: var(--ink); font-family: var(--f-mono); flex-shrink: 0;
    }
    .score-modal-table { width: 100%; border-collapse: collapse; font-family: var(--f-mono); font-size: 0.78rem; margin-bottom: 0.5rem; }
    .score-modal-table td { padding: 0.32rem 0.2rem; color: var(--ink); }
    .score-modal-table td:last-child { text-align: right; font-weight: 700; }
    .score-modal-table tr { border-bottom: 1px solid var(--chip); }
    .score-modal-table tr:last-child { border-bottom: none; }
    .score-modal-table .row-subtotal td { border-top: 2px solid var(--ink); padding-top: 0.55rem; font-weight: 700; }
    .score-modal-table .row-mult td { color: var(--muted); font-size: 0.72rem; }
    .score-modal-total {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-top: 0.75rem; padding-top: 0.75rem; border-top: var(--border-w) solid var(--ink);
      font-family: var(--f-display); font-size: 1.15rem; letter-spacing: 0.01em;
    }
    .score-modal-disclaimer {
      margin-top: 0.7rem; font-family: var(--f-mono); font-size: 0.62rem;
      color: var(--muted); line-height: 1.5; opacity: 0.75;
    }

    /* ── Results view ── */
    .results-pending { text-align: center; padding: 3.5rem 1.25rem 3rem; max-width: 520px; margin: 0 auto; }
    .results-pending-icon { font-size: 3.4rem; display: inline-block; margin-bottom: 1rem; }
    .results-pending-text { font-family: var(--f-mono); font-size: 0.85rem; color: var(--muted); line-height: 1.7; }

    .results-section { max-width: 760px; margin: 0 auto 1.6rem; padding: 0 1rem; }
    .results-heading {
      font-family: var(--f-display); font-size: 1rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink); margin-bottom: 0.7rem;
    }

    .podium-card { margin-bottom: 0.7rem; }
    .podium-card .medal { font-size: 1.5rem; }

    .pb-card { padding: 0.4rem 1rem; }
    .pb-row { display: flex; align-items: center; gap: 0.8rem; padding: 0.7rem 0; border-bottom: 1px solid var(--ink); flex-wrap: wrap; }
    .pb-row:last-child { border-bottom: none; }
    .pb-pot { font-family: var(--f-mono); font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; min-width: 3.5rem; }
    .pb-teams { display: flex; gap: 1.2rem; flex-wrap: wrap; }
    .pb-team { display: flex; align-items: center; gap: 0.4rem; font-family: var(--f-body); font-weight: 600; }
    .pb-team .t-score { font-family: var(--f-mono); font-size: 0.8rem; color: var(--muted); font-weight: 400; }

    .ov-card { margin-bottom: 0.6rem; }
    .ov-dots { display: flex; gap: 0.22rem; margin-top: 0.4rem; }
    .ov-dot { width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid var(--ink); background: transparent; }
    .ov-dot.filled { background: var(--live); border-color: var(--live); }
    .ov-count { font-family: var(--f-display); font-weight: 800; font-size: 1.3rem; }
    .ov-matched { display: flex; flex-direction: column; gap: 0.5rem; }
    .ov-match { display: flex; align-items: center; gap: 0.5rem; font-family: var(--f-body); font-weight: 600; }
    .ov-none { font-family: var(--f-mono); font-size: 0.8rem; color: var(--muted); }

    .pick-row { display: flex; gap: 0.9rem; flex-wrap: wrap; }
    .pick-card { flex: 1 1 220px; padding: 1.1rem; text-align: center; }
    .pick-icon { font-size: 2.2rem; }
    .pick-label { font-family: var(--f-display); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 0.4rem 0 0.6rem; }
    .pick-team { display: flex; align-items: center; justify-content: center; gap: 0.4rem; font-family: var(--f-body); font-weight: 700; font-size: 1.15rem; }
    .pick-score { font-family: var(--f-mono); font-size: 0.85rem; color: var(--muted); margin-top: 0.3rem; }
    .pick-by { font-family: var(--f-mono); font-size: 0.68rem; color: var(--muted); margin-top: 0.5rem; }
  </style>
</head>
<body>
  <header>
    <p class="eyebrow">WC 2026 &middot; Pool Tracker</p>
    <nav class="view-nav">
      <button id="nav-standings" class="pill active" onclick="switchView('standings')">Standings</button>
      <button id="nav-matches"   class="pill"        onclick="switchView('matches')">Matches</button>
      <button id="nav-results"   class="pill"        onclick="switchView('results')">Results</button>
    </nav>
    <div id="status-bar">
      <span id="last-updated"></span>
      <span id="refresh-spinner" class="spinner hidden">&#8635;</span>
      <span id="fetched-at"></span>
    </div>
    <div class="controls">
      <button id="mode-btn" class="pill" onclick="toggleMode()">Demo data</button>
      <button id="error-btn" class="pill" onclick="toggleError()">Error</button>
    </div>
  </header>
  <main id="leaderboard"></main>

  <main id="matches-view" class="hidden">
    <div class="match-filters">
      <button id="mf-today"    class="pill active" onclick="setMatchFilter('today')">Today</button>
      <button id="mf-results"  class="pill"        onclick="setMatchFilter('results')">Results</button>
      <button id="mf-upcoming" class="pill"        onclick="setMatchFilter('upcoming')">Upcoming</button>
    </div>
    <div id="match-list"></div>
  </main>

  <main id="results-view" class="hidden">
    <div id="results-content"></div>
  </main>

  <div id="score-modal" class="score-modal hidden" role="dialog" aria-modal="true">
    <div class="score-modal-backdrop"></div>
    <div class="score-modal-card">
      <div class="score-modal-header">
        <span id="score-modal-flag" class="score-modal-flag"></span>
        <span id="score-modal-name" class="score-modal-name"></span>
        <button class="score-modal-close" id="score-modal-close" aria-label="Close">✕</button>
      </div>
      <table id="score-modal-table" class="score-modal-table"></table>
      <div class="score-modal-total">
        <span>TOTAL</span>
        <span id="score-modal-total-val"></span>
      </div>
      <p class="score-modal-disclaimer">Scores for live or recently finished games may not be final until match stats are confirmed.</p>
    </div>
  </div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────────
    const API_KEY  = '3f78d135cc954c46bb6b8f1cf10b7205'; // yes this is visible, yes it's free, go get your own: football-data.org
    const API_BASE = 'https://api.football-data.org/v4';
    const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

    /* TESTABLE:START */
    // ── Static Data ──────────────────────────────────────────────────────────────
    const POTS = {
      1: ["Spain","France","England","Portugal","Brazil","Argentina","Germany","Netherlands","Belgium","Uruguay","Norway","Morocco"],
      2: ["Japan","USA","Colombia","Croatia","Mexico","Switzerland","Turkey","Ecuador","Sweden","Austria","Senegal","South Korea"],
      3: ["Czechia","Bosnia and Herzegovina","Canada","Paraguay","Scotland","Algeria","Egypt","Ivory Coast","Ghana","Iran","Tunisia","Australia"],
      4: ["Saudi Arabia","Qatar","South Africa","Uzbekistan","Iraq","Jordan","New Zealand","Panama","DR Congo","Haiti","Cape Verde","Curacao"]
    };
    const TEAM_POT = {};
    for (const [pot, teams] of Object.entries(POTS)) for (const team of teams) TEAM_POT[team] = Number(pot);

    const PARTICIPANTS = [

    const MOCK_ELIMINATED = new Set(['Czechia','Qatar','Scotland','Paraguay','Uzbekistan','Panama','South Africa','Haiti','Saudi Arabia','Jordan','DR Congo','South Korea','Norway','Algeria','Ecuador','Japan','New Zealand','Mexico','Canada','Germany','Netherlands','USA','Colombia','Argentina','Brazil']);

    const NAME_MAP = {
      "Czech Republic":"Czechia","Curaçao":"Curacao","Congo DR":"DR Congo","Bosnia-Herzegovina":"Bosnia and Herzegovina",
      "Korea Republic":"South Korea","Côte d'Ivoire":"Ivory Coast","United States":"USA","Cape Verde Islands":"Cape Verde"

    const normalizeName = (name) => NAME_MAP[name] ?? name;

    // ── Scoring Engine ────────────────────────────────────────────────────────────
    // Per team:  (matchPoints + goals + groupBonus + knockoutBonus) × pot
    //   groupBonus     = [GW 8, RU 4, 3rd 2, 4th 1] once all 3 group games played
    //   knockoutBonus  = R32 win 8 + QF 12 + SF 24 + Final 36 + Champion 48 (cumulative)
    function calcTeamScore(teamName, teamStats) {
      const pot = TEAM_POT[teamName];
      const stats = teamStats[teamName];
      if (!stats || !pot) return 0;
      const groupBonus = stats.playedGames >= 3 ? ([0,8,4,2,1][stats.groupPosition] ?? 0) : 0;
      const knockoutBonus = (stats.wonLast32?8:0) + (stats.reachedQF?12:0) + (stats.reachedSF?24:0) + (stats.reachedFinal?36:0) + (stats.isChampion?48:0);
      return (stats.matchPoints + stats.totalGoals + groupBonus + knockoutBonus) * pot;
    }
    const calcPersonScore = (p, teamStats) => p.teams.reduce((s, t) => s + calcTeamScore(t, teamStats), 0);

    // ── Results: pure computations ────────────────────────────────────────────────
    function isTournamentComplete(matchesData) {
      const final = matchesData?.matches?.find(m => m.stage === 'FINAL');
      return final?.status === 'FINISHED';
    }

    function rankTeamsByScore(teamNames, teamStats) {
      return [...teamNames].sort((a, b) => {
        const scoreDiff = calcTeamScore(b, teamStats) - calcTeamScore(a, teamStats);
        if (scoreDiff !== 0) return scoreDiff;
        const goalsDiff = (teamStats[b]?.totalGoals ?? 0) - (teamStats[a]?.totalGoals ?? 0);
        if (goalsDiff !== 0) return goalsDiff;
        return a.localeCompare(b);
      });
    }

    function computePerfectBracket(teamStats) {
      const bracket = {};
      for (const [pot, teams] of Object.entries(POTS)) {
        bracket[pot] = rankTeamsByScore(teams, teamStats).slice(0, 2);
      }
      return bracket;
    }

    function computeOverlap(participant, perfectTeamsSet) {
      const matched = participant.teams.filter(t => perfectTeamsSet.has(t));
      return { matched, count: matched.length };
    }

    function findBestWorstPick(teamStats) {
      const draftedBy = {};
      for (const p of PARTICIPANTS) {
        for (const t of p.teams) (draftedBy[t] ??= []).push(p.name);
      }
      const ranked = rankTeamsByScore(Object.keys(draftedBy), teamStats);
      const best = ranked[0];
      const worst = ranked[ranked.length - 1];
      return {
        best:  { team: best,  score: calcTeamScore(best, teamStats),  pickedBy: draftedBy[best] },
        worst: { team: worst, score: calcTeamScore(worst, teamStats), pickedBy: draftedBy[worst] },
      };
    }

    // ── API Layer ───────────────────────────────────────────────────────────────
    // Locally: hits football-data.org directly. Deployed (GitHub Pages): reads
    // static ./data/*.json refreshed every 10 min by GitHub Actions.
    async function fetchStandings() {
      const url  = IS_LOCAL ? `${API_BASE}/competitions/WC/standings` : './data/standings.json';
      const opts = IS_LOCAL ? { headers: { 'X-Auth-Token': API_KEY } } : { cache: 'no-cache' };
      const res  = await fetch(url, opts);
      if (!res.ok) throw new Error(`Standings ${res.status}`);
      return res.json();
    }
    async function fetchMatches() {
      const url  = IS_LOCAL ? `${API_BASE}/competitions/WC/matches` : './data/matches.json';
      const opts = IS_LOCAL ? { headers: { 'X-Auth-Token': API_KEY } } : { cache: 'no-cache' };
      const res  = await fetch(url, opts);
      if (!res.ok) throw new Error(`Matches ${res.status}`);
      return res.json();
    }

    const GOAL_ONLY_STAGES = new Set(['LAST_32','LAST_16','THIRD_PLACE']);
    const BONUS_STAGES     = new Set(['QUARTER_FINALS','SEMI_FINALS','FINAL']);
    const ALL_KNOCKOUT     = new Set([...GOAL_ONLY_STAGES, ...BONUS_STAGES]);

    function buildTeamStats(standingsData, matchesData) {
      const stats = {};
      for (const group of standingsData.standings) {
        for (const entry of group.table) {
          const name = normalizeName(entry.team.name);
          stats[name] = {
            matchPoints: entry.points, groupPosition: entry.position, playedGames: entry.playedGames,
            won: entry.won, draw: entry.draw, lost: entry.lost, group: group.group, totalGoals: entry.goalsFor,
            reachedQF: false, reachedSF: false, reachedFinal: false, isChampion: false, wonLast32: false
          };
        }
      }
      for (const match of matchesData.matches) {
        if (!ALL_KNOCKOUT.has(match.stage) || match.status !== 'FINISHED') continue;
        const home = normalizeName(match.homeTeam.name);
        const away = normalizeName(match.awayTeam.name);
        const hg = match.score.fullTime.home ?? 0;
        const ag = match.score.fullTime.away ?? 0;
        if (stats[home]) { stats[home].totalGoals += hg; stats[home].playedGames += 1; }
        if (stats[away]) { stats[away].totalGoals += ag; stats[away].playedGames += 1; }
        let win, lose;
        if (hg !== ag) { win = hg>ag?home:away; lose = hg>ag?away:home; }
        else { const hp = match.score.penalties?.home ?? 0, ap = match.score.penalties?.away ?? 0; win = hp>ap?home:away; lose = hp>ap?away:home; }
        if (stats[win])  stats[win].won  += 1;
        if (stats[lose]) stats[lose].lost += 1;
        // Advancement flags are driven by winning the *prior* round rather than by
        // waiting for the next round's stage entry to appear with real team names —
        // that bracket-assignment gap otherwise delays badges/bonuses by days.
        // QF/SF/Final "reached" bonuses still credit both eventual participants,
        // since both got there by winning the round before.
        if (match.stage === 'LAST_32'        && stats[win]) stats[win].wonLast32   = true;
        if (match.stage === 'LAST_16'        && stats[win]) stats[win].reachedQF   = true;
        if (match.stage === 'QUARTER_FINALS' && stats[win]) stats[win].reachedSF   = true;
        if (match.stage === 'SEMI_FINALS'    && stats[win]) stats[win].reachedFinal = true;
        if (match.stage === 'FINAL'          && stats[win]) stats[win].isChampion  = true;
      }
      return stats;
    }

    // ── Live / Eliminated State ───────────────────────────────────────────────────
    let liveTeams = new Set();
    let eliminatedTeams = new Set();
    function buildActivitySets(matchesData, teamStats) {
      liveTeams = new Set(); eliminatedTeams = new Set();
      const scheduled = new Set(), played = new Set(), knockoutLatest = new Map(), knockoutPlayed = new Set();
      for (const match of matchesData.matches) {
        const home = normalizeName(match.homeTeam.name);
        const away = normalizeName(match.awayTeam.name);
        const s = match.status;
        // 'LIVE' is a second in-progress status the API returns alongside 'IN_PLAY'
        if (s === 'IN_PLAY' || s === 'PAUSED' || s === 'LIVE') {
          if (home) liveTeams.add(home); if (away) liveTeams.add(away);
        }
        if (s === 'SCHEDULED' || s === 'TIMED') { if (home) scheduled.add(home); if (away) scheduled.add(away); }
        if (s === 'FINISHED') { if (home) played.add(home); if (away) played.add(away); }
        // Track knockout participants to handle bracket-assignment gaps: next-round
        // slots have null team names until the bracket is officially set, so a team
        // that just won can't be found in `scheduled` until then. We protect a team
        // from elimination based on their MOST RECENT knockout result (by date), not
        // just "ever won a knockout match" — otherwise an early-round win (e.g. R32)
        // would keep protecting a team forever, even after they lose a later round.
        if (ALL_KNOCKOUT.has(match.stage) && s === 'FINISHED' && home && away) {
          knockoutPlayed.add(home); knockoutPlayed.add(away);
          const hg = match.score.fullTime.home ?? 0, ag = match.score.fullTime.away ?? 0;
          let winner, loser;
          if (hg !== ag) { winner = hg > ag ? home : away; loser = hg > ag ? away : home; }
          else { const hp = match.score.penalties?.home ?? 0, ap = match.score.penalties?.away ?? 0; winner = hp > ap ? home : away; loser = hp > ap ? away : home; }
          for (const [team, won] of [[winner, true], [loser, false]]) {
            const prev = knockoutLatest.get(team);
            if (!prev || match.utcDate > prev.date) knockoutLatest.set(team, { date: match.utcDate, won });
          }
        }
      }
      for (const team of played) {
        if (scheduled.has(team) || liveTeams.has(team) || knockoutLatest.get(team)?.won) continue;
        // Protect 1st/2nd place group finishers until their R32 slot is assigned —
        // but only before they've played a knockout match; after that, win/loss decides.
        const stats = teamStats?.[team];
        if (!knockoutPlayed.has(team) && stats?.playedGames >= 3 && stats.groupPosition <= 2) continue;
        eliminatedTeams.add(team);
      }
    }

    // ── Leaderboard Renderer ──────────────────────────────────────────────────────
    const GROUP_LABELS = ['', 'GW', 'RU', '3rd', '4th'];

    function teamBadges(stats) {
      const parts = [];
      if (stats.playedGames >= 3 && stats.groupPosition) parts.push(`<span class="badge">${GROUP_LABELS[stats.groupPosition] ?? ''}</span>`);
      if (stats.wonLast32)    parts.push('<span class="badge r32">R16</span>');
      if (stats.reachedQF)    parts.push('<span class="badge qf">QF</span>');
      if (stats.reachedSF)    parts.push('<span class="badge sf">SF</span>');
      if (stats.reachedFinal) parts.push('<span class="badge final">Final</span>');
      if (stats.isChampion)   parts.push('<span class="badge champion">🏆 Champ</span>');
      return parts.join('');
    }

    function renderTeamBreakdown(participant, teamStats) {
      const rows = participant.teams.map(teamName => {
        const stats = teamStats[teamName] ?? { matchPoints:0, groupPosition:0, playedGames:0, won:0, draw:0, lost:0, totalGoals:0, group:'', reachedQF:false, reachedSF:false, reachedFinal:false, isChampion:false };
        const score = calcTeamScore(teamName, teamStats);
        const pot   = TEAM_POT[teamName] ?? '?';
        const isElim = eliminatedTeams.has(teamName);
        const liveDot = liveTeams.has(teamName) ? '<span class="live-dot"></span>' : '';
        const wdl = stats.playedGames > 0 ? `${stats.won}W ${stats.draw}D ${stats.lost}L · ` : '';
        return `<div class="team-row${isElim ? ' elim' : ''}">
          <span class="t-flag" data-team="${teamName}">${FLAGS[teamName] ?? '🏳️'}</span>
          <span class="t-name">${teamName}${liveDot} <span class="t-mult">(×${pot})</span></span>
          <span class="t-score">${score}</span>
          <div class="t-detail"><span>${wdl}${stats.totalGoals}g · ${stats.matchPoints}pts</span>${teamBadges(stats)}</div>
        </div>`;
      });
      return `<div class="breakdown"><div class="breakdown-inner">${rows.join('')}</div></div>`;
    }

    function renderParticipantRow(participant, rank, maxScore, teamStats, expandedName) {
      const barPct   = maxScore > 0 ? Math.round((participant.score / maxScore) * 100) : 0;
      const expanded = participant.name === expandedName ? ' expanded' : '';
      const flagKit  = participant.teams.map(t => {
        const cls = eliminatedTeams.has(t) ? ' elim' : liveTeams.has(t) ? ' live' : '';
        return `<span class="flag${cls}">${FLAGS[t] ?? '🏳️'}</span>`;
      }).join('');
      return `<div class="card rank-${rank}${expanded}" data-name="${participant.name}">
        <div class="card-header">
          <div class="medal">${String(rank).padStart(2, '0')}</div>
          <div class="mid">
            <div class="name">${participant.name}</div>
            <div class="flag-kit">${flagKit}</div>
          </div>
          <div class="right">
            <div>
              <div class="score">${participant.score}</div>
              <div class="pts">PTS</div>
            </div>
            <span class="chev">&#8250;</span>
          </div>
        </div>
        <div class="bar"><i style="width:${barPct}%"></i></div>
        ${renderTeamBreakdown(participant, teamStats)}
      </div>`;
    }

    function renderLeaderboard(teamStats) {
      const board = document.getElementById('leaderboard');
      const expandedName = board.querySelector('.card.expanded')?.dataset.name ?? null;
      const ranked = PARTICIPANTS.map(p => ({ ...p, score: calcPersonScore(p, teamStats) })).sort((a,b) => b.score - a.score);
      const maxScore = ranked[0]?.score || 1;
      board.innerHTML = ranked.map((p, i) => renderParticipantRow(p, i + 1, maxScore, teamStats, expandedName)).join('');
    }

      }
    }

    function setMatchFilter(filter) {
      matchFilter = filter;
      ['today','results','upcoming'].forEach(f => {
        document.getElementById(`mf-${f}`).classList.toggle('active', f === filter);
      });
      if (lastGoodData) renderMatchesView(lastGoodData.matches.matches);
    }

    function filterMatches(matches) {
      const today = new Date().toLocaleDateString();
      if (matchFilter === 'today') {
        return matches
          .filter(m => new Date(m.utcDate).toLocaleDateString() === today)
          .sort((a, b) => a.utcDate.localeCompare(b.utcDate));
      }
      if (matchFilter === 'results') {
        return matches
          .filter(m => m.status === 'FINISHED')
          .sort((a, b) => b.utcDate.localeCompare(a.utcDate));
      }
      // upcoming: scheduled + live
      return matches
        .filter(m => m.status !== 'FINISHED')
        .sort((a, b) => a.utcDate.localeCompare(b.utcDate));
    }

    function matchDateLabel(utcDate) {
      const d = new Date(utcDate);
      const today    = new Date().toLocaleDateString();
      const yesterday = new Date(Date.now() - 864e5).toLocaleDateString();
      const local = d.toLocaleDateString();
      const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (local === today)     return `Today · ${label}`;
      if (local === yesterday) return `Yesterday · ${label}`;
      return label;
    }

    function renderMatchCard(match) {
      const home     = match.homeTeam.name ? normalizeName(match.homeTeam.name) : null;
      const away     = match.awayTeam.name ? normalizeName(match.awayTeam.name) : null;
      const homeFlag = (home && FLAGS[home]) ? FLAGS[home] : '🏳️';
      const awayFlag = (away && FLAGS[away]) ? FLAGS[away] : '🏳️';
      const homeName = home ?? 'TBD';
      const awayName = away ?? 'TBD';
      const isLive   = match.status === 'IN_PLAY' || match.status === 'PAUSED';
      const isDone   = match.status === 'FINISHED';
      const winner   = match.score?.winner; // 'HOME_TEAM' | 'AWAY_TEAM' | 'DRAW' | null

      // Stage / group label
      let stageLabel = STAGE_LABELS[match.stage] ?? match.stage;
      if (match.stage === 'GROUP_STAGE' && match.group) {
        const grp = match.group.replace('GROUP_', 'Group ');
        stageLabel = `${grp} · MD ${match.matchday}`;
      }

      // Right-side status
      let statusHtml;
      if (isLive) {
        statusHtml = `<span class="match-status-live"><span class="live-dot"></span>In Progress</span>`;
      } else if (isDone) {
        statusHtml = `<span>FT</span>`;
      } else {
        const t = new Date(match.utcDate).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
        statusHtml = `<span>${t}</span>`;
      }

      // Score or vs
      let scoreHtml;
      if (isDone || isLive) {
        const h = match.score.fullTime.home ?? 0;
        const a = match.score.fullTime.away ?? 0;
        scoreHtml = `<div class="match-score">${h} — ${a}</div>`;
      } else {
        scoreHtml = `<div class="match-score-vs">vs</div>`;
      }

      const homeLost = isDone && winner === 'AWAY_TEAM';
      const awayLost = isDone && winner === 'HOME_TEAM';

      return `<div class="match-card">
        <div class="match-meta"><span>${stageLabel}</span>${statusHtml}</div>
        <div class="match-teams">
          <div class="match-home${homeLost ? ' lost' : ''}">
            <span class="match-team-flag">${homeFlag}</span>
            <span class="match-team-name">${homeName}</span>
          </div>
          ${scoreHtml}
          <div class="match-away${awayLost ? ' lost' : ''}">
            <span class="match-team-name">${awayName}</span>
            <span class="match-team-flag">${awayFlag}</span>
          </div>
        </div>
      </div>`;
    }

    function renderMatchesView(matchesData) {
      const matches = filterMatches(matchesData);
      const list = document.getElementById('match-list');

      if (matches.length === 0) {
        const msg = matchFilter === 'today'
          ? 'No matches today<br>Check Results or Upcoming'
          : matchFilter === 'results' ? 'No results yet'
          : 'No upcoming matches';
        list.innerHTML = `<p class="match-empty">${msg}</p>`;
        return;
      }

      // Group by local date
      const groups = new Map();
      for (const m of matches) {
        const key = new Date(m.utcDate).toLocaleDateString();
        if (!groups.has(key)) groups.set(key, { label: matchDateLabel(m.utcDate), matches: [] });
        groups.get(key).matches.push(m);
      }

      const showHeaders = matchFilter !== 'today';
      let html = '';
      for (const { label, matches: group } of groups.values()) {
        if (showHeaders) html += `<div class="date-header">${label}</div>`;
        html += group.map(renderMatchCard).join('');
      }
      list.innerHTML = html;
    }

    // ── Results View ─────────────────────────────────────────────────────────────
    const MEDAL_ICON = ['🥇', '🥈', '🥉'];

    function renderPodium(podium) {
      const rows = podium.map((p, i) => `
        <div class="card rank-${i + 1} podium-card">
          <div class="card-header">
            <div class="medal">${MEDAL_ICON[i]}</div>
            <div class="mid"><div class="name">${p.name}</div></div>
            <div class="right"><div><div class="score">${p.score}</div><div class="pts">PTS</div></div></div>
          </div>
        </div>`).join('');
      return `<section class="results-section">
        <h2 class="results-heading">Final Results</h2>
        ${rows}
      </section>`;
    }

    function renderPerfectBracket(perfectBracket, teamStats) {
      const rows = Object.entries(perfectBracket).map(([pot, teams]) => {
        const teamHtml = teams.map(t => `
          <span class="pb-team">
            <span class="t-flag" data-team="${t}">${FLAGS[t] ?? '🏳️'}</span>
            <span class="t-name">${t}</span>
            <span class="t-score">${calcTeamScore(t, teamStats)}</span>
          </span>`).join('');
        return `<div class="pb-row"><span class="pb-pot">Pot ${pot}</span><div class="pb-teams">${teamHtml}</div></div>`;
      }).join('');
      return `<section class="results-section">
        <h2 class="results-heading">The Perfect Bracket</h2>
        <div class="card pb-card">${rows}</div>
      </section>`;
    }

    function renderOverlapSection(overlaps, expandedName = null) {
      const rows = overlaps.map(p => {
        const dots = Array.from({ length: 8 }, (_, i) =>
          `<span class="ov-dot${i < p.count ? ' filled' : ''}"></span>`).join('');
        const matchedHtml = p.matched.map(t => `
          <span class="ov-match"><span class="t-flag" data-team="${t}">${FLAGS[t] ?? '🏳️'}</span> ${t}</span>`).join('');
        const expanded = p.name === expandedName ? ' expanded' : '';
        return `<div class="card ov-card${expanded}" data-name="${p.name}">
          <div class="card-header">
            <div class="mid"><div class="name">${p.name}</div><div class="ov-dots">${dots}</div></div>
            <div class="right"><div class="ov-count">${p.count}/8</div><span class="chev">&#8250;</span></div>
          </div>
          <div class="breakdown"><div class="breakdown-inner ov-matched">${matchedHtml || '<span class="ov-none">No matches</span>'}</div></div>
        </div>`;
      }).join('');
      return `<section class="results-section">
        <h2 class="results-heading">How Close Did You Get?</h2>
        ${rows}
      </section>`;
    }

    function renderBestWorstSection(best, worst) {
      const pickCard = (icon, label, pick, cls) => `
        <div class="card pick-card ${cls}">
          <div class="pick-icon">${icon}</div>
          <div class="pick-label">${label}</div>
          <div class="pick-team">
            <span class="t-flag" data-team="${pick.team}">${FLAGS[pick.team] ?? '🏳️'}</span>
            <span class="t-name">${pick.team}</span>
          </div>
          <div class="pick-score">${pick.score} pts</div>
          <div class="pick-by">Picked by ${pick.pickedBy.join(', ')}</div>
        </div>`;
      return `<section class="results-section">
        <h2 class="results-heading">Best Pick &amp; Bust of the Pool</h2>
        <div class="pick-row">
          ${pickCard('🔥', 'Best Pick', best, 'pick-best')}
          ${pickCard('💀', 'Bust of the Pool', worst, 'pick-worst')}
        </div>
      </section>`;
    }

    function renderResultsView(teamStats, isComplete) {
      const container = document.getElementById('results-content');
      if (!isComplete) {
        container.innerHTML = `
          <div class="results-pending">
            <span class="results-pending-icon">🏆</span>
            <p class="results-pending-text">Tournament in progress — check back after the final.</p>
          </div>`;
        return;
      }

      const expandedName = container.querySelector('.ov-card.expanded')?.dataset.name ?? null;

      const ranked = PARTICIPANTS
        .map(p => ({ ...p, score: calcPersonScore(p, teamStats) }))
        .sort((a, b) => b.score - a.score);
      const podium = ranked.slice(0, 3);
      const perfectBracket = computePerfectBracket(teamStats);
      const perfectTeamsSet = new Set(Object.values(perfectBracket).flat());
      const overlaps = ranked
        .map(p => ({ ...p, ...computeOverlap(p, perfectTeamsSet) }))
        .sort((a, b) => b.count - a.count);
      const { best, worst } = findBestWorstPick(teamStats);

      container.innerHTML = [
        renderPodium(podium),
        renderPerfectBracket(perfectBracket, teamStats),
        renderOverlapSection(overlaps, expandedName),
        renderBestWorstSection(best, worst),
      ].join('');
    }
    /* TESTABLE:END */

    // ── App Controller ────────────────────────────────────────────────────────────
    const LIVE_INTERVAL = 60_000;
    const IDLE_INTERVAL = 5 * 60_000;
    let mode = 'demo';
    let errorActive = false;
    let refreshTimer = null;
    let lastGoodData = null;
    let lastTeamStats = null;

    function scheduleNext() {
      clearTimeout(refreshTimer);
      if (mode !== 'live') return;
      const delay = (IS_LOCAL && liveTeams.size > 0) ? LIVE_INTERVAL : IDLE_INTERVAL;
      refreshTimer = setTimeout(doRefresh, delay);
    }

    function renderDemo() {
      liveTeams = new Set();
      eliminatedTeams = MOCK_ELIMINATED;
      lastTeamStats = MOCK_TEAM_STATS;
      renderLeaderboard(MOCK_TEAM_STATS);
      renderResultsView(MOCK_TEAM_STATS, true);
      document.getElementById('last-updated').textContent = 'Demo · post-final snapshot — France champions';
      setStatusColor('demo');
      setRefreshing(false);
    }

    async function doRefresh() {
      if (mode !== 'live') return;
      setRefreshing(true);
      try {
        const [standings, matches] = await Promise.all([fetchStandings(), fetchMatches()]);
        lastGoodData = { standings, matches };
        const teamStats = buildTeamStats(standings, matches);
        lastTeamStats = teamStats;
        buildActivitySets(matches, teamStats);
        renderLeaderboard(teamStats);
        renderResultsView(teamStats, isTournamentComplete(matches));
        if (currentView === 'matches') renderMatchesView(matches.matches);
        updateLastUpdated(matches);
        setStatusColor('live');
        errorActive = false;
      } catch (err) {
        console.error('Refresh failed:', err);
        if (lastGoodData) {
          const teamStats = buildTeamStats(lastGoodData.standings, lastGoodData.matches);
          lastTeamStats = teamStats;
          buildActivitySets(lastGoodData.matches, teamStats);
          renderLeaderboard(teamStats);
          renderResultsView(teamStats, isTournamentComplete(lastGoodData.matches));
          updateLastUpdated(lastGoodData.matches);
          document.getElementById('last-updated').textContent += ' · could not refresh';
          setStatusColor('error');
        } else {
          renderErrorState();
          setStatusColor('error');
        }
      } finally {
        setRefreshing(false);
        scheduleNext();
      }
    }

    function toggleMode() {
      mode = mode === 'live' ? 'demo' : 'live';
      errorActive = false;
      document.getElementById('error-btn').classList.remove('active', 'error');
      clearTimeout(refreshTimer);
      const btn = document.getElementById('mode-btn');
      btn.textContent = mode === 'live' ? '● Live' : 'Demo data';
      btn.classList.toggle('active', mode === 'live');
      btn.classList.toggle('live', mode === 'live');
      if (mode === 'live') { document.getElementById('last-updated').textContent = 'Loading…'; setStatusColor(null); doRefresh(); }
      else renderDemo();
    }

    function toggleError() {
      errorActive = !errorActive;
      const btn = document.getElementById('error-btn');
      btn.classList.toggle('active', errorActive);
      btn.classList.toggle('error', errorActive);
      clearTimeout(refreshTimer);
      if (errorActive) {
        setRefreshing(false);
        document.getElementById('last-updated').textContent = '';
        setStatusColor('error');
        renderErrorState();
      } else if (mode === 'live') {
        doRefresh();
      } else {
        renderDemo();
      }
    }

    // ── Score Breakdown Modal ─────────────────────────────────────────────────────
    const GROUP_BONUS_LABELS = ['', 'Group Winner', 'Runner-up', '3rd Place', '4th Place'];
    const GROUP_BONUS_VALUES = [0, 8, 4, 2, 1];

    function showScoreModal(teamName) {
      const stats = lastTeamStats?.[teamName];
      const pot   = TEAM_POT[teamName];
      if (!pot) return;
      const s = stats ?? { matchPoints:0, groupPosition:0, playedGames:0, totalGoals:0, wonLast32:false, reachedQF:false, reachedSF:false, reachedFinal:false, isChampion:false };

      const groupBonus    = s.playedGames >= 3 ? (GROUP_BONUS_VALUES[s.groupPosition] ?? 0) : 0;
      const r32Bonus      = s.wonLast32  ? 8  : 0;
      const qfBonus       = s.reachedQF  ? 12 : 0;
      const sfBonus       = s.reachedSF  ? 24 : 0;
      const finalBonus    = s.reachedFinal ? 36 : 0;
      const champBonus    = s.isChampion  ? 48 : 0;
      const subtotal      = s.matchPoints + s.totalGoals + groupBonus + r32Bonus + qfBonus + sfBonus + finalBonus + champBonus;
      const total         = subtotal * pot;

      const rows = [];
      const row = (label, val, cls = '') => `<tr class="${cls}"><td>${label}</td><td>${val > 0 ? '+' : ''}${val}</td></tr>`;

      rows.push(row('Match Points', s.matchPoints));
      rows.push(row('Goals Scored', s.totalGoals));
      if (groupBonus)   rows.push(row(`Group Bonus (${GROUP_BONUS_LABELS[s.groupPosition]})`, groupBonus));
      if (r32Bonus)     rows.push(row('Round of 32 Win', r32Bonus));
      if (qfBonus)      rows.push(row('Quarter-final', qfBonus));
      if (sfBonus)      rows.push(row('Semi-final', sfBonus));
      if (finalBonus)   rows.push(row('Final', finalBonus));
      if (champBonus)   rows.push(row('Champion', champBonus));
      rows.push(`<tr class="row-subtotal"><td>Subtotal</td><td>${subtotal}</td></tr>`);
      rows.push(`<tr class="row-mult"><td>Pot ${pot} multiplier</td><td>×${pot}</td></tr>`);

      document.getElementById('score-modal-flag').textContent = FLAGS[teamName] ?? '🏳️';
      document.getElementById('score-modal-name').textContent = teamName;
      document.getElementById('score-modal-table').innerHTML = rows.join('');
      document.getElementById('score-modal-total-val').textContent = total;
      document.getElementById('score-modal').classList.remove('hidden');
    }

    function closeScoreModal() {
      document.getElementById('score-modal').classList.add('hidden');
    }

    // ── Init ──────────────────────────────────────────────────────────────────────
    // Long press on status bar temporarily shows fetched-at time in place of the normal label.
    (function () {
      let restoreTimer = null;
      const bar     = document.getElementById('status-bar');
      const label   = document.getElementById('last-updated');
      bar.addEventListener('contextmenu', e => {
        e.preventDefault();
        const raw = lastGoodData?.matches?._fetchedAt;
        const saved = label.textContent;
        label.textContent = raw
          ? 'fetched ' + new Date(raw).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' })
          : 'fetched time unavailable';
        clearTimeout(restoreTimer);
        restoreTimer = setTimeout(() => { label.textContent = saved; }, 3000);
      });
    })();

    // Shift+D reveals the Error dev toggle.
    document.addEventListener('keydown', e => {
      if (e.key === 'D' && e.shiftKey && !e.ctrlKey && !e.metaKey) {
        const leaving = !document.body.classList.toggle('dev-mode');
        if (leaving && errorActive) toggleError();
      }
    });

    // Expand / collapse a participant card (but not when opening the score modal).
    document.getElementById('leaderboard').addEventListener('click', e => {
      if (e.target.closest('.t-flag[data-team]')) return;
      const card = e.target.closest('.card');
      if (card) card.classList.toggle('expanded');
    });

    // Right-click / long-press a team flag in an expanded card → score breakdown.
    document.getElementById('leaderboard').addEventListener('contextmenu', e => {
      const flag = e.target.closest('.t-flag[data-team]');
      if (!flag) return;
      e.preventDefault();
      showScoreModal(flag.dataset.team);
    });

    // Same two interactions, scoped to the Results view's overlap cards / team flags.
    document.getElementById('results-content').addEventListener('click', e => {
      if (e.target.closest('.t-flag[data-team]')) return;
      const card = e.target.closest('.ov-card');
      if (card) card.classList.toggle('expanded');
    });

    document.getElementById('results-content').addEventListener('contextmenu', e => {
      const flag = e.target.closest('.t-flag[data-team]');
      if (!flag) return;
      e.preventDefault();
      showScoreModal(flag.dataset.team);
    });

    // Close modal: backdrop click, close button, or Escape.
    document.getElementById('score-modal').addEventListener('click', e => {
      if (e.target.closest('.score-modal-card') && !e.target.closest('#score-modal-close')) return;
      closeScoreModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeScoreModal();
    });

    // Start in live mode immediately.
    toggleMode();
  </script>
  <div id="fetched-toast"></div>
</body>
</html>
