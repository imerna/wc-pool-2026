<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC Pool 2026 — Standings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ──────────────────────────────────────────────────────────────────────────
       "KIT" THEME — brutalist streetwear scoreboard
       Concrete-paper ground, white cards with thick black outlines + hard offset
       shadows, square gold/silver/bronze medal blocks, red-orange energy bars,
       Archivo Black display + Space Grotesk body + Space Mono data.
    ────────────────────────────────────────────────────────────────────────── */
    :root {
      --bg:        #e9e5db;
      --card:      #ffffff;
      --ink:       #14110c;
      --muted:     #6f685b;
      --accent:    #ff4422;
      --live:      #0aa34a;
      --gold:      #ffcf2e;
      --silver:    #d8d8d4;
      --bronze:    #ff9a4d;
      --chip:      #f3f1ea;
      --f-display: 'Archivo Black', system-ui, sans-serif;
      --f-body:    'Space Grotesk', system-ui, sans-serif;
      --f-mono:    'Space Mono', monospace;
      --radius:    6px;
      --border-w:  2.5px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--f-body);
      min-height: 100vh;
      padding-bottom: 3.5rem;
    }

    /* ── Header ── */
    header { padding: 2.6rem 1.25rem 1.5rem; text-align: center; }

    .eyebrow {
      font-family: var(--f-display);
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    h1 {
      font-family: var(--f-display);
      font-weight: 800;
      font-size: clamp(2.7rem, 8vw, 4.2rem);
      letter-spacing: 0.015em;
      line-height: 0.9;
      text-transform: uppercase;
      color: var(--ink);
    }

    #status-bar {
      margin-top: 0.7rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.6rem;
      min-height: 1.1rem;
      font-family: var(--f-mono);
      font-size: 0.7rem;
      letter-spacing: 0.02em;
      color: var(--muted);
    }
    .spinner { display: inline-block; font-size: 0.8rem; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .controls { margin-top: 1.15rem; display: flex; justify-content: center; gap: 0.45rem; flex-wrap: wrap; }
    .pill {
      font-family: var(--f-display);
      font-weight: 700;
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.42rem 0.92rem;
      border-radius: 999px;
      line-height: 1;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--ink);
      transition: all 0.15s ease;
    }
    .pill.active.live  { background: rgba(10,163,74,0.16);  color: var(--live);   border-color: var(--live); }
    .pill.active.error { background: rgba(255,68,34,0.16);  color: var(--accent); border-color: var(--accent); }

    /* Dev pills hidden until Shift+D */
    #mode-btn, #error-btn { display: none; }
    .dev-mode #mode-btn, .dev-mode #error-btn { display: inline-block; }
    #fetched-at { display: none; font-family: var(--f-mono); font-size: 0.65rem; color: var(--muted); opacity: 0.7; }
    .dev-mode #fetched-at { display: inline; }
    #fetched-toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: var(--fg); color: var(--bg);
      font-family: var(--f-mono); font-size: 0.75rem;
      padding: 0.4rem 0.9rem; border-radius: 999px;
      pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 999;
      white-space: nowrap;
    }
    #fetched-toast.visible { opacity: 1; }
    #status-bar { user-select: none; -webkit-user-select: none; }

    /* Status bar color matches active mode */
    #last-updated { transition: color 0.3s ease; }
    #last-updated.state-live  { color: var(--live); }
    #last-updated.state-demo  { color: var(--gold); }
    #last-updated.state-error { color: var(--accent); }

    /* ── Layout ── */
    main { max-width: 760px; margin: 0 auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 0.95rem; }

    /* ── Participant cards ── */
    .card {
      background: var(--card);
      border: var(--border-w) solid var(--ink);
      border-radius: var(--radius);
      box-shadow: 5px 5px 0 var(--ink);
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    @media (hover: hover) { .card:hover { transform: translateY(-2px); box-shadow: 9px 9px 0 var(--ink); } }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.95rem;
      padding: 1rem 1.15rem;
      cursor: pointer;
      user-select: none;
    }

    .medal {
      width: 2.7rem; height: 2.7rem;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--f-display); font-weight: 800; font-size: 1.1rem;
      border: var(--border-w) solid var(--ink);
      border-radius: 5px;
      background: #fff; color: var(--ink);
    }
    .card.rank-1 .medal { background: var(--gold); }
    .card.rank-2 .medal { background: var(--silver); }
    .card.rank-3 .medal { background: var(--bronze); }

    .mid { flex: 1; min-width: 0; }
    .name { font-family: var(--f-body); font-weight: 700; font-size: 1.38rem; line-height: 1.05; letter-spacing: -0.01em; }
    .flag-kit { display: flex; gap: 0.18rem; margin-top: 0.38rem; flex-wrap: wrap; line-height: 1; }
    .flag-kit .flag { font-size: 0.92rem; transition: opacity 0.2s ease, filter 0.2s ease; }
    .flag-kit .flag.elim { opacity: 0.3; filter: grayscale(1); }
    .flag-kit .flag.live { filter: drop-shadow(0 0 4px var(--live)); }

    .right { display: flex; align-items: center; gap: 0.7rem; flex-shrink: 0; }
    .score { font-family: var(--f-display); font-weight: 800; font-size: 2.2rem; line-height: 0.82; letter-spacing: 0.01em; text-align: right; }
    .pts   { font-family: var(--f-mono); font-size: 0.56rem; font-weight: 600; letter-spacing: 0.22em; color: var(--muted); margin-top: 0.2rem; text-align: right; }
    .chev  { font-size: 1.5rem; line-height: 1; color: var(--muted); transition: transform 0.25s ease; }
    .card.expanded .chev { transform: rotate(90deg); }

    /* ── Energy bar ── */
    .bar { height: 7px; background: var(--ink); }
    .bar > i { display: block; height: 100%; background: var(--accent); border-radius: 0 3px 3px 0; transition: width 0.7s cubic-bezier(0.16,1,0.3,1); }
    .card.rank-1 .bar > i { background: var(--gold); }
    .card.rank-2 .bar > i { background: var(--silver); }
    .card.rank-3 .bar > i { background: var(--bronze); }

    /* ── Breakdown (expand/collapse) ── */
    .breakdown { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.35s ease, opacity 0.3s ease; }
    .card.expanded .breakdown { max-height: 900px; opacity: 1; }
    .breakdown-inner { padding: 0.35rem 0.9rem 1rem; }

    .team-row {
      display: grid;
      grid-template-columns: 1.7rem 1fr auto;
      gap: 0.6rem;
      align-items: center;
      padding: 0.55rem 0.35rem;
      border-bottom: 1px solid var(--ink);
    }
    .team-row:last-child { border-bottom: none; }
    .team-row.elim { opacity: 0.5; }

    .t-flag  { font-size: 1.15rem; line-height: 1; text-align: center; }
    .t-name  { font-family: var(--f-body); font-weight: 600; font-size: 1rem; min-width: 0; display: flex; align-items: center; gap: 0.1rem; }
    .t-mult  { font-family: var(--f-mono); font-size: 0.75rem; color: var(--muted); opacity: 0.7; }
    .t-score { font-family: var(--f-display); font-weight: 700; font-size: 1.25rem; line-height: 1; text-align: right; letter-spacing: 0.01em; }
    .t-detail {
      grid-column: 1 / -1;
      font-family: var(--f-mono); font-size: 0.7rem; color: var(--muted);
      display: flex; gap: 0.35rem; flex-wrap: wrap; align-items: center;
      padding: 0.1rem 0 0 1.6rem; line-height: 1.5;
    }

    .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--live); margin-left: 0.4rem; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.82); } }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center;
      font-family: var(--f-mono); font-size: 0.58rem; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
      padding: 0.12rem 0.36rem; border-radius: 5px; white-space: nowrap;
      background: var(--chip); color: var(--muted); border: 1px solid var(--ink);
    }
    .badge.qf       { background: rgba(56,128,255,0.16); color: #4f8cff; border-color: rgba(56,128,255,0.34); }
    .badge.sf       { background: rgba(34,197,94,0.16);  color: #22c55e; border-color: rgba(34,197,94,0.34); }
    .badge.final    { background: rgba(234,179,8,0.18);  color: #ca9a04; border-color: rgba(234,179,8,0.42); }
    .badge.champion { background: rgba(255,68,34,0.18);  color: var(--accent); border-color: rgba(255,68,34,0.5); }

    /* ── Error state ── */
    .error-state { text-align: center; padding: 3.5rem 1.25rem 3rem; max-width: 520px; margin: 0 auto; }
    .error-icon { font-size: 4.6rem; display: inline-block; margin-bottom: 1.1rem; transform-origin: center bottom; animation: tilt 2.2s ease-in-out infinite; }
    @keyframes tilt { 0%, 100% { transform: rotate(-9deg); } 50% { transform: rotate(9deg); } }
    .error-title { font-family: var(--f-display); font-weight: 800; font-size: 1.9rem; text-transform: uppercase; letter-spacing: 0.01em; margin-bottom: 0.5rem; }
    .error-sub   { font-family: var(--f-mono); font-size: 0.8rem; line-height: 1.8; color: var(--muted); }

    .hidden { display: none !important; }

    /* ── View nav ── */
    .view-nav { margin: 0.5rem 0 0.6rem; display: flex; justify-content: center; gap: 0.6rem; }
    .view-nav .pill { font-size: 0.92rem; padding: 0.55rem 1.5rem; border-width: 2px; }
    .view-nav .pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    /* ── Match filters ── */
    .match-filters { max-width: 760px; margin: 0 auto 1rem; padding: 0 1rem; display: flex; gap: 0.45rem; flex-wrap: wrap; }
    .match-filters .pill.active { background: rgba(20,17,12,0.12); color: var(--ink); }

    /* ── Date group header ── */
    .date-header { max-width: 760px; margin: 0 auto 0.5rem; padding: 0 1rem;
      font-family: var(--f-display); font-size: 0.78rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--muted); }
    .date-header + .date-header, .match-card + .date-header { margin-top: 1.4rem; }

    /* ── Match card ── */
    .match-card { background: var(--card); border: var(--border-w) solid var(--ink);
      border-radius: var(--radius); box-shadow: 4px 4px 0 var(--ink);
      max-width: 760px; margin: 0 auto 0.6rem; padding: 0.75rem 1rem; }

    .match-meta { display: flex; justify-content: space-between; align-items: center;
      font-family: var(--f-mono); font-size: 0.65rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.6rem; }
    .match-status-live { color: var(--live); display: flex; align-items: center; gap: 0.3rem; }

    .match-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 0.5rem; }
    .match-home { display: flex; align-items: center; gap: 0.45rem; }
    .match-away { display: flex; align-items: center; gap: 0.45rem; justify-content: flex-end; }
    .match-team-name { font-family: var(--f-body); font-weight: 600; font-size: 1rem; }
    .match-team-flag { font-size: 1.3rem; line-height: 1; flex-shrink: 0; }
    .match-score { font-family: var(--f-display); font-size: 1.6rem; line-height: 1;
      text-align: center; letter-spacing: 0.04em; white-space: nowrap; padding: 0 0.25rem; }
    .match-score-vs { font-family: var(--f-mono); font-size: 0.8rem; color: var(--muted); text-align: center; }
    .match-home.lost, .match-away.lost { opacity: 0.38; }

    /* ── Match empty state ── */
    .match-empty { text-align: center; padding: 3rem 1rem;
      font-family: var(--f-mono); font-size: 0.8rem; color: var(--muted); line-height: 1.8; }
  </style>
</head>

      "DR Congo":{matchPoints:3,groupPosition:3,playedGames:3,won:1,draw:0,lost:2,group:"Group K",totalGoals:3,reachedQF:false,reachedSF:false,reachedFinal:false,isChampion:false},
      "Czechia":{matchPoints:0,groupPosition:4,playedGames:3,won:0,draw:0,lost:3,group:"Group A",totalGoals:1,reachedQF:false,reachedSF:false,reachedFinal:false,isChampion:false},
      "Qatar":{matchPoints:0,groupPosition:4,playedGames:3,won:0,draw:0,lost:3,group:"Group B",totalGoals:0,reachedQF:false,reachedSF:false,reachedFinal:false,isChampion:false},
      "Scotland":{matchPoints:0,groupPosition:4,playedGames:3,won:0,draw:0,lost:3,group:"Group C",totalGoals:0,reachedQF:false,reachedSF:false,reachedFinal:false,isChampion:false},
      "Paraguay":{matchPoints:1,groupPosition:4,playedGames:3,won:0,draw:1,lost:2,group:"Group D",totalGoals:2,reachedQF:false,reachedSF:false,reachedFinal:false,isChampion:false},
      "Uzbekistan":{matchPoints:0,groupPosition:4,playedGames:3,won:0,draw:0,lost:3,group:"Group K",totalGoals:0,reachedQF:false,reachedSF:false,reachedFinal:false,isChampion:false},
      "Panama":{matchPoints:0,groupPosition:4,playedGames:3,won:0,draw:0,lost:3,group:"Group L",totalGoals:0,reachedQF:false,reachedSF:false,reachedFinal:false,isChampion:false}
    };
    const MOCK_ELIMINATED = new Set(['Czechia','Qatar','Scotland','Paraguay','Uzbekistan','Panama','South Africa','Haiti','Saudi Arabia','Jordan','DR Congo','South Korea','Norway','Algeria','Ecuador','Japan','New Zealand','Mexico','Canada','Germany','Netherlands','USA','Colombia','Argentina','Brazil']);

    const NAME_MAP = {
      "Czech Republic":"Czechia","Curaçao":"Curacao","Congo DR":"DR Congo","Bosnia-Herzegovina":"Bosnia and Herzegovina",
      "Korea Republic":"South Korea","Côte d'Ivoire":"Ivory Coast","United States":"USA","Cape Verde Islands":"Cape Verde"
    };
    const normalizeName = (name) => NAME_MAP[name] ?? name;

    // ── Scoring Engine ────────────────────────────────────────────────────────────
    // Per team:  (matchPoints + goals + groupBonus + knockoutBonus) × pot
    //   groupBonus     = [GW 8, RU 4, 3rd 2, 4th 1] once all 3 group games played
    //   knockoutBonus  = QF 12 + SF 24 + Final 36 + Champion 48 (cumulative)
    function calcTeamScore(teamName, teamStats) {
      const pot = TEAM_POT[teamName];
      const stats = teamStats[teamName];
      if (!stats || !pot) return 0;
      const groupBonus = stats.playedGames >= 3 ? ([0,8,4,2,1][stats.groupPosition] ?? 0) : 0;
      const knockoutBonus = (stats.reachedQF?12:0) + (stats.reachedSF?24:0) + (stats.reachedFinal?36:0) + (stats.isChampion?48:0);
      return (stats.matchPoints + stats.totalGoals + groupBonus + knockoutBonus) * pot;
    }
    const calcPersonScore = (p, teamStats) => p.teams.reduce((s, t) => s + calcTeamScore(t, teamStats), 0);

    // ── API Layer ───────────────────────────────────────────────────────────────
    // Locally: hits football-data.org directly. Deployed (GitHub Pages): reads
    // static ./data/*.json refreshed every 10 min by GitHub Actions.
    async function fetchStandings() {
      const url  = IS_LOCAL ? `${API_BASE}/competitions/WC/standings` : './data/standings.json';
      const opts = IS_LOCAL ? { headers: { 'X-Auth-Token': API_KEY } } : { cache: 'no-cache' };
      const res  = await fetch(url, opts);
      if (!res.ok) throw new Error(`Standings ${res.status}`);
      return res.json();
    }
    async function fetchMatches() {
      const url  = IS_LOCAL ? `${API_BASE}/competitions/WC/matches` : './data/matches.json';
      const opts = IS_LOCAL ? { headers: { 'X-Auth-Token': API_KEY } } : { cache: 'no-cache' };
      const res  = await fetch(url, opts);
      if (!res.ok) throw new Error(`Matches ${res.status}`);
      return res.json();
    }

    const GOAL_ONLY_STAGES = new Set(['LAST_32','LAST_16','THIRD_PLACE']);
    const BONUS_STAGES     = new Set(['QUARTER_FINALS','SEMI_FINALS','FINAL']);
    const ALL_KNOCKOUT     = new Set([...GOAL_ONLY_STAGES, ...BONUS_STAGES]);

    function buildTeamStats(standingsData, matchesData) {
      const stats = {};
      for (const group of standingsData.standings) {
        for (const entry of group.table) {
          const name = normalizeName(entry.team.name);
          stats[name] = {
            matchPoints: entry.points, groupPosition: entry.position, playedGames: entry.playedGames,
            won: entry.won, draw: entry.draw, lost: entry.lost, group: group.group, totalGoals: entry.goalsFor,
            reachedQF: false, reachedSF: false, reachedFinal: false, isChampion: false
          };
        }
      }
      for (const match of matchesData.matches) {
        if (!ALL_KNOCKOUT.has(match.stage) || match.status !== 'FINISHED') continue;
        const home = normalizeName(match.homeTeam.name);
        const away = normalizeName(match.awayTeam.name);
        const hg = match.score.fullTime.home ?? 0;
        const ag = match.score.fullTime.away ?? 0;
        if (stats[home]) { stats[home].totalGoals += hg; stats[home].playedGames += 1; }
        if (stats[away]) { stats[away].totalGoals += ag; stats[away].playedGames += 1; }
        let win, lose;
        if (hg !== ag) { win = hg>ag?home:away; lose = hg>ag?away:home; }
        else { const hp = match.score.penalties?.home ?? 0, ap = match.score.penalties?.away ?? 0; win = hp>ap?home:away; lose = hp>ap?away:home; }
        if (stats[win])  stats[win].won  += 1;
        if (stats[lose]) stats[lose].lost += 1;
        if (!BONUS_STAGES.has(match.stage)) continue;
        for (const team of [home, away]) {
          if (!stats[team]) continue;
          if (match.stage === 'QUARTER_FINALS') stats[team].reachedQF = true;
          if (match.stage === 'SEMI_FINALS')    stats[team].reachedSF = true;
          if (match.stage === 'FINAL')          stats[team].reachedFinal = true;
        }
        if (match.stage === 'FINAL') {
          let winner;
          if (hg !== ag) winner = hg>ag?home:away;
          else { const hp = match.score.penalties?.home ?? 0, ap = match.score.penalties?.away ?? 0; winner = hp>ap?home:away; }
          if (stats[winner]) stats[winner].isChampion = true;
        }
      }
      return stats;
    }

    // ── Live / Eliminated State ───────────────────────────────────────────────────
    let liveTeams = new Set();
    let eliminatedTeams = new Set();
    function buildActivitySets(matchesData) {
      liveTeams = new Set(); eliminatedTeams = new Set();
      const scheduled = new Set(), played = new Set();
      for (const match of matchesData.matches) {
        const home = normalizeName(match.homeTeam.name);
        const away = normalizeName(match.awayTeam.name);
        if (match.status === 'IN_PLAY' || match.status === 'PAUSED') { liveTeams.add(home); liveTeams.add(away); }
        if (match.status === 'SCHEDULED' || match.status === 'TIMED') { scheduled.add(home); scheduled.add(away); }
        if (match.status === 'FINISHED') { played.add(home); played.add(away); }
      }
      for (const team of played) if (!scheduled.has(team) && !liveTeams.has(team)) eliminatedTeams.add(team);
    }

    // ── UI Helpers ────────────────────────────────────────────────────────────────
    const setRefreshing = (active) => document.getElementById('refresh-spinner').classList.toggle('hidden', !active);
    function setStatusColor(state) {
      const el = document.getElementById('last-updated');
      el.className = state ? `state-${state}` : '';
    }
    function updateLastUpdated(matchesData) {
      const ts = matchesData?.matches?.map(m => m.lastUpdated).filter(Boolean) ?? [];
      const date = ts.length ? new Date(ts.reduce((a,b) => a>b?a:b)) : new Date();
      document.getElementById('last-updated').textContent =
        `Data as of ${date.toLocaleDateString('en-US',{month:'short',day:'numeric'})} · ` +
        `${date.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'})}`;
      if (matchesData?._fetchedAt) {
        const fetched = new Date(matchesData._fetchedAt);
        document.getElementById('fetched-at').textContent =
          `fetched ${fetched.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'})}`;
      }
    }

    // ── Leaderboard Renderer ──────────────────────────────────────────────────────
    const GROUP_LABELS = ['', 'GW', 'RU', '3rd', '4th'];
    const ORDINALS     = ['', '1st', '2nd', '3rd', '4th'];

    function teamBadges(stats) {
      const parts = [];
      if (stats.playedGames >= 3 && stats.groupPosition) parts.push(`<span class="badge">${GROUP_LABELS[stats.groupPosition] ?? ''}</span>`);
      if (stats.reachedQF)    parts.push('<span class="badge qf">QF</span>');
      if (stats.reachedSF)    parts.push('<span class="badge sf">SF</span>');
      if (stats.reachedFinal) parts.push('<span class="badge final">Final</span>');
      if (stats.isChampion)   parts.push('<span class="badge champion">🏆 Champ</span>');
      return parts.join('');
    }

    function renderTeamBreakdown(participant, teamStats) {
      const rows = participant.teams.map(teamName => {
        const stats = teamStats[teamName] ?? { matchPoints:0, groupPosition:0, playedGames:0, won:0, draw:0, lost:0, totalGoals:0, group:'', reachedQF:false, reachedSF:false, reachedFinal:false, isChampion:false };
        const score = calcTeamScore(teamName, teamStats);
        const pot   = TEAM_POT[teamName] ?? '?';
        const isElim = eliminatedTeams.has(teamName);
        const liveDot = liveTeams.has(teamName) ? '<span class="live-dot"></span>' : '';
        const wdl = stats.playedGames > 0 ? `${stats.won}W ${stats.draw}D ${stats.lost}L · ` : '';
        return `<div class="team-row${isElim ? ' elim' : ''}">
          <span class="t-flag">${FLAGS[teamName] ?? '🏳️'}</span>
          <span class="t-name">${teamName}${liveDot} <span class="t-mult">(×${pot})</span></span>
          <span class="t-score">${score}</span>
          <div class="t-detail"><span>${wdl}${stats.totalGoals}g · ${stats.matchPoints}pts</span>${teamBadges(stats)}</div>
        </div>`;
      });
      return `<div class="breakdown"><div class="breakdown-inner">${rows.join('')}</div></div>`;
    }

    function renderParticipantRow(participant, rank, maxScore, teamStats, expandedName) {
      const barPct   = maxScore > 0 ? Math.round((participant.score / maxScore) * 100) : 0;
      const expanded = participant.name === expandedName ? ' expanded' : '';
      const flagKit  = participant.teams.map(t => {
        const cls = eliminatedTeams.has(t) ? ' elim' : liveTeams.has(t) ? ' live' : '';
        return `<span class="flag${cls}">${FLAGS[t] ?? '🏳️'}</span>`;
      }).join('');
      return `<div class="card rank-${rank}${expanded}" data-name="${participant.name}">
        <div class="card-header">
          <div class="medal">${String(rank).padStart(2, '0')}</div>
          <div class="mid">
            <div class="name">${participant.name}</div>
            <div class="flag-kit">${flagKit}</div>
          </div>
          <div class="right">
            <div>
              <div class="score">${participant.score}</div>
              <div class="pts">PTS</div>
            </div>
            <span class="chev">&#8250;</span>
          </div>
        </div>
        <div class="bar"><i style="width:${barPct}%"></i></div>
        ${renderTeamBreakdown(participant, teamStats)}
      </div>`;
    }

    function renderLeaderboard(teamStats) {
      const board = document.getElementById('leaderboard');
      const expandedName = board.querySelector('.card.expanded')?.dataset.name ?? null;
      const ranked = PARTICIPANTS.map(p => ({ ...p, score: calcPersonScore(p, teamStats) })).sort((a,b) => b.score - a.score);
      const maxScore = ranked[0]?.score || 1;
      board.innerHTML = ranked.map((p, i) => renderParticipantRow(p, i + 1, maxScore, teamStats, expandedName)).join('');
    }

    function renderErrorState() {
      document.getElementById('leaderboard').innerHTML = `
        <div class="error-state">
          <span class="error-icon">🤠</span>
          <p class="error-title">Whoa there, partner.</p>
          <p class="error-sub">Slow down, cowboy — the API's winded.<br>Give it a minute and mosey on back.</p>
        </div>`;
    }

    // ── Matches View ─────────────────────────────────────────────────────────────
    const STAGE_LABELS = {
      GROUP_STAGE: 'Group Stage', LAST_32: 'Round of 32', LAST_16: 'Round of 16',
      QUARTER_FINALS: 'Quarter-final', SEMI_FINALS: 'Semi-final',
      FINAL: 'Final', THIRD_PLACE: 'Third Place'
    };

    let currentView = 'standings';
    let matchFilter = 'today';

    function switchView(view) {
      currentView = view;
      document.getElementById('leaderboard').classList.toggle('hidden', view !== 'standings');
      document.getElementById('matches-view').classList.toggle('hidden', view !== 'matches');
      document.getElementById('nav-standings').classList.toggle('active', view === 'standings');
      document.getElementById('nav-matches').classList.toggle('active', view === 'matches');
      if (view === 'matches') {
        if (lastGoodData) renderMatchesView(lastGoodData.matches.matches);
        else document.getElementById('match-list').innerHTML =
          '<p class="match-empty">Loading match data…</p>';
      }
    }

    function setMatchFilter(filter) {
      matchFilter = filter;
      ['today','results','upcoming'].forEach(f => {
        document.getElementById(`mf-${f}`).classList.toggle('active', f === filter);
      });
      if (lastGoodData) renderMatchesView(lastGoodData.matches.matches);
    }

    function filterMatches(matches) {
      const today = new Date().toLocaleDateString();
      if (matchFilter === 'today') {
        return matches
          .filter(m => new Date(m.utcDate).toLocaleDateString() === today)
          .sort((a, b) => a.utcDate.localeCompare(b.utcDate));
      }
      if (matchFilter === 'results') {
        return matches
          .filter(m => m.status === 'FINISHED')
          .sort((a, b) => b.utcDate.localeCompare(a.utcDate));
      }
      // upcoming: scheduled + live
      return matches
        .filter(m => m.status !== 'FINISHED')
        .sort((a, b) => a.utcDate.localeCompare(b.utcDate));
    }

    function matchDateLabel(utcDate) {
      const d = new Date(utcDate);
      const today    = new Date().toLocaleDateString();
      const yesterday = new Date(Date.now() - 864e5).toLocaleDateString();
      const local = d.toLocaleDateString();
      const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (local === today)     return `Today · ${label}`;
      if (local === yesterday) return `Yesterday · ${label}`;
      return label;
    }

    function renderMatchCard(match) {
      const home     = match.homeTeam.name ? normalizeName(match.homeTeam.name) : null;
      const away     = match.awayTeam.name ? normalizeName(match.awayTeam.name) : null;
      const homeFlag = (home && FLAGS[home]) ? FLAGS[home] : '🏳️';
      const awayFlag = (away && FLAGS[away]) ? FLAGS[away] : '🏳️';
      const homeName = home ?? 'TBD';
      const awayName = away ?? 'TBD';
      const isLive   = match.status === 'IN_PLAY' || match.status === 'PAUSED';
      const isDone   = match.status === 'FINISHED';
      const winner   = match.score?.winner; // 'HOME_TEAM' | 'AWAY_TEAM' | 'DRAW' | null

      // Stage / group label
      let stageLabel = STAGE_LABELS[match.stage] ?? match.stage;
      if (match.stage === 'GROUP_STAGE' && match.group) {
        const grp = match.group.replace('GROUP_', 'Group ');
        stageLabel = `${grp} · MD ${match.matchday}`;
      }

      // Right-side status
      let statusHtml;
      if (isLive) {
        statusHtml = `<span class="match-status-live"><span class="live-dot"></span>In Progress</span>`;
      } else if (isDone) {
        statusHtml = `<span>FT</span>`;
      } else {
        const t = new Date(match.utcDate).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
        statusHtml = `<span>${t}</span>`;
      }

      // Score or vs
      let scoreHtml;
      if (isDone || isLive) {
        const h = match.score.fullTime.home ?? 0;
        const a = match.score.fullTime.away ?? 0;
        scoreHtml = `<div class="match-score">${h} — ${a}</div>`;
      } else {
        scoreHtml = `<div class="match-score-vs">vs</div>`;
      }

      const homeLost = isDone && winner === 'AWAY_TEAM';
      const awayLost = isDone && winner === 'HOME_TEAM';

      return `<div class="match-card">
        <div class="match-meta"><span>${stageLabel}</span>${statusHtml}</div>
        <div class="match-teams">
          <div class="match-home${homeLost ? ' lost' : ''}">
            <span class="match-team-flag">${homeFlag}</span>
            <span class="match-team-name">${homeName}</span>
          </div>
          ${scoreHtml}
          <div class="match-away${awayLost ? ' lost' : ''}">
            <span class="match-team-name">${awayName}</span>
            <span class="match-team-flag">${awayFlag}</span>
          </div>
        </div>
      </div>`;
    }

    function renderMatchesView(matchesData) {
      const matches = filterMatches(matchesData);
      const list = document.getElementById('match-list');

      if (matches.length === 0) {
        const msg = matchFilter === 'today'
          ? 'No matches today<br>Check Results or Upcoming'
          : matchFilter === 'results' ? 'No results yet'
          : 'No upcoming matches';
        list.innerHTML = `<p class="match-empty">${msg}</p>`;
        return;
      }

      // Group by local date
      const groups = new Map();
      for (const m of matches) {
        const key = new Date(m.utcDate).toLocaleDateString();
        if (!groups.has(key)) groups.set(key, { label: matchDateLabel(m.utcDate), matches: [] });
        groups.get(key).matches.push(m);
      }

      const showHeaders = matchFilter !== 'today';
      let html = '';
      for (const { label, matches: group } of groups.values()) {
        if (showHeaders) html += `<div class="date-header">${label}</div>`;
        html += group.map(renderMatchCard).join('');
      }
      list.innerHTML = html;
    }

    // ── App Controller ────────────────────────────────────────────────────────────
    const LIVE_INTERVAL = 60_000;
    const IDLE_INTERVAL = 5 * 60_000;
    let mode = 'demo';
    let errorActive = false;
    let refreshTimer = null;
    let lastGoodData = null;

    function scheduleNext() {
      clearTimeout(refreshTimer);
      if (mode !== 'live') return;
      const delay = (IS_LOCAL && liveTeams.size > 0) ? LIVE_INTERVAL : IDLE_INTERVAL;
      refreshTimer = setTimeout(doRefresh, delay);
    }

    function renderDemo() {
      liveTeams = new Set();
      eliminatedTeams = MOCK_ELIMINATED;
      renderLeaderboard(MOCK_TEAM_STATS);
      document.getElementById('last-updated').textContent = 'Demo · post-final snapshot — France champions';
      setStatusColor('demo');
      setRefreshing(false);
    }

    async function doRefresh() {
      if (mode !== 'live') return;
      setRefreshing(true);
      try {
        const [standings, matches] = await Promise.all([fetchStandings(), fetchMatches()]);
        lastGoodData = { standings, matches };
        const teamStats = buildTeamStats(standings, matches);
        buildActivitySets(matches);
        renderLeaderboard(teamStats);
        if (currentView === 'matches') renderMatchesView(matches.matches);
        updateLastUpdated(matches);
        setStatusColor('live');
        errorActive = false;
      } catch (err) {
        console.error('Refresh failed:', err);
        if (lastGoodData) {
          const teamStats = buildTeamStats(lastGoodData.standings, lastGoodData.matches);
          buildActivitySets(lastGoodData.matches);
          renderLeaderboard(teamStats);
          updateLastUpdated(lastGoodData.matches);
          document.getElementById('last-updated').textContent += ' · could not refresh';
          setStatusColor('error');
        } else {
          renderErrorState();
          setStatusColor('error');
        }
      } finally {
        setRefreshing(false);
        scheduleNext();
      }
    }

    function toggleMode() {
      mode = mode === 'live' ? 'demo' : 'live';
      errorActive = false;
      document.getElementById('error-btn').classList.remove('active', 'error');
      clearTimeout(refreshTimer);
      const btn = document.getElementById('mode-btn');
      btn.textContent = mode === 'live' ? '● Live' : 'Demo data';
      btn.classList.toggle('active', mode === 'live');
      btn.classList.toggle('live', mode === 'live');
      if (mode === 'live') { document.getElementById('last-updated').textContent = 'Loading…'; setStatusColor(null); doRefresh(); }
      else renderDemo();
    }

    function toggleError() {
      errorActive = !errorActive;
      const btn = document.getElementById('error-btn');
      btn.classList.toggle('active', errorActive);
      btn.classList.toggle('error', errorActive);
      clearTimeout(refreshTimer);
      if (errorActive) {
        setRefreshing(false);
        document.getElementById('last-updated').textContent = '';
        setStatusColor('error');
        renderErrorState();
      } else if (mode === 'live') {
        doRefresh();
      } else {
        renderDemo();
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────────
    // Long press on status bar shows fetched-at time (mobile-friendly).
    (function () {
      let pressTimer = null, toastTimer = null, startX = 0, startY = 0;
      const bar   = document.getElementById('status-bar');
      const toast = document.getElementById('fetched-toast');
      bar.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        pressTimer = setTimeout(() => {
          const raw = lastGoodData?.matches?._fetchedAt;
          toast.textContent = raw
            ? 'fetched ' + new Date(raw).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' })
            : document.getElementById('fetched-at').textContent || 'fetched time unavailable';
          toast.classList.add('visible');
          clearTimeout(toastTimer);
          toastTimer = setTimeout(() => toast.classList.remove('visible'), 2500);
        }, 600);
      }, { passive: true });
      bar.addEventListener('touchmove', e => {
        if (Math.abs(e.touches[0].clientX - startX) > 10 ||
            Math.abs(e.touches[0].clientY - startY) > 10) clearTimeout(pressTimer);
      }, { passive: true });
      bar.addEventListener('touchend',    () => clearTimeout(pressTimer));
      bar.addEventListener('touchcancel', () => clearTimeout(pressTimer));
      bar.addEventListener('contextmenu', e => e.preventDefault());
    })();

    // Shift+D reveals the Error dev toggle.
    document.addEventListener('keydown', e => {
      if (e.key === 'D' && e.shiftKey && !e.ctrlKey && !e.metaKey) {
        const leaving = !document.body.classList.toggle('dev-mode');
        if (leaving && errorActive) toggleError();
      }
    });

    // Expand / collapse a participant card.
    document.getElementById('leaderboard').addEventListener('click', e => {
      const card = e.target.closest('.card');
      if (card) card.classList.toggle('expanded');
    });

    // Start in live mode immediately.
    toggleMode();
  </script>
  <div id="fetched-toast"></div>
</body>
</html>
